version: "3.8"

services:
  jlax-docs:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      # Écoute uniquement en local — YunoHost nginx proxifie depuis l'extérieur
      - "127.0.0.1:8080:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
