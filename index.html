<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jlax Expertise — Base de Connaissances</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Fira+Code:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:        #1b2a4a;
      --blue:        #2563eb;
      --green:       #16a34a;
      --gold:        #a16207;
      --orange:      #d97706;

      --bg:          #0c1422;
      --sidebar-bg:  #101b2d;
      --surface:     #182336;
      --surface-2:   #1e2d44;
      --border:      rgba(148,163,184,.10);
      --border-mid:  rgba(148,163,184,.18);
      --border-str:  rgba(148,163,184,.28);

      --tx:          #e1e8f0;
      --tx-2:        #8fa1b8;
      --tx-3:        #4d6380;

      --pack-core:    #16a34a;
      --pack-premium: #2563eb;
      --pack-rd:      #a16207;
      --pack-main:    #475569;

      --sidebar-w:   288px;
      --topbar-h:    50px;
      --transition:  0.18s ease;

      --font-serif:  'Libre Baskerville', Georgia, serif;
      --font-mono:   'Fira Code', 'Cascadia Code', monospace;
      --font-ui:     'Outfit', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; overflow: hidden;
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--tx);
      -webkit-font-smoothing: antialiased;
    }

    /* ── App layout ────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: 100vh;
    }

    /* ── SIDEBAR ────────────────────────────────────────── */
    .sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .s-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 6px;
    }

    .brand-mark {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--blue), #1d4ed8);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 500;
      color: #fff;
      letter-spacing: -0.5px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(37,99,235,.35);
    }

    .brand-name {
      font-family: var(--font-serif);
      font-size: 15.5px;
      color: var(--tx);
      line-height: 1.2;
    }

    .brand-name em {
      font-style: italic;
      color: var(--tx-2);
      font-size: 11px;
      display: block;
      font-family: var(--font-mono);
      letter-spacing: .4px;
      margin-top: 2px;
    }

    /* Search */
    .s-search {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
    }

    .s-search svg {
      position: absolute;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--tx-3);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 7px;
      padding: 7px 10px 7px 32px;
      font-size: 12.5px;
      font-family: var(--font-ui);
      color: var(--tx);
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }

    .search-input:focus {
      border-color: var(--blue);
      background: var(--surface-2);
    }

    .search-input::placeholder { color: var(--tx-3); }

    .search-hint {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--tx-3);
      background: var(--surface-2);
      border: 1px solid var(--border-mid);
      border-radius: 3px;
      padding: 1px 5px;
      pointer-events: none;
      transition: opacity var(--transition);
    }

    .search-input:focus ~ .search-hint { opacity: 0; }

    /* Nav */
    .s-nav {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 12px;
    }

    .s-nav::-webkit-scrollbar { width: 3px; }
    .s-nav::-webkit-scrollbar-track { background: transparent; }
    .s-nav::-webkit-scrollbar-thumb {
      background: var(--border-str);
      border-radius: 2px;
    }

    /* Groups */
    .group { }

    .group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px 5px 12px;
      cursor: pointer;
      user-select: none;
      transition: background var(--transition);
    }

    .group-header:hover { background: rgba(255,255,255,.03); }

    .group-pip {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .group-label {
      font-family: var(--font-mono);
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 1.1px;
      color: var(--tx-3);
      flex: 1;
    }

    .group-count {
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--tx-3);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 1px 6px;
    }

    .group-caret {
      color: var(--tx-3);
      font-size: 9px;
      transition: transform var(--transition);
    }

    .group.closed .group-caret { transform: rotate(-90deg); }

    .group-body {
      overflow: hidden;
      max-height: 9999px;
      transition: max-height 0.28s cubic-bezier(.4,0,.2,1);
    }

    .group.closed .group-body { max-height: 0; }

    /* Doc items */
    .doc-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px 7px 22px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background var(--transition), border-color var(--transition);
      position: relative;
    }

    .doc-item:hover { background: rgba(255,255,255,.04); }

    .doc-item.active {
      background: rgba(255,255,255,.05);
    }

    .doc-icon {
      font-size: 13px;
      flex-shrink: 0;
      opacity: .55;
      transition: opacity var(--transition);
    }

    .doc-item:hover .doc-icon,
    .doc-item.active .doc-icon { opacity: .85; }

    .doc-info { flex: 1; min-width: 0; }

    .doc-title {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--tx-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color var(--transition);
    }

    .doc-item:hover .doc-title,
    .doc-item.active .doc-title { color: var(--tx); }

    .doc-sub {
      font-size: 11px;
      color: var(--tx-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .doc-status {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--tx-3);
      transition: background var(--transition);
    }

    .doc-status.ok   { background: var(--green); }
    .doc-status.miss { background: var(--tx-3); }

    /* Group divider */
    .g-sep {
      height: 1px;
      background: var(--border);
      margin: 6px 0;
    }

    /* No results */
    .no-results {
      padding: 24px 16px;
      text-align: center;
      font-size: 12px;
      color: var(--tx-3);
    }

    /* Footer */
    .s-footer {
      padding: 11px 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .stat { display: flex; flex-direction: column; gap: 2px; }

    .stat-n {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 500;
      color: var(--tx);
      line-height: 1;
    }

    .stat-l {
      font-family: var(--font-mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .9px;
      color: var(--tx-3);
    }

    .s-footer-sep {
      width: 1px; height: 28px;
      background: var(--border);
    }

    /* ── VIEWER PANEL ──────────────────────────────────── */
    .viewer {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    /* Topbar */
    .v-topbar {
      height: var(--topbar-h);
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      display: none;
      align-items: center;
      padding: 0 18px;
      gap: 14px;
      flex-shrink: 0;
    }

    .v-topbar.visible { display: flex; }

    .v-breadcrumb {
      display: flex;
      align-items: center;
      gap: 9px;
      flex: 1;
      min-width: 0;
    }

    .v-pack-badge {
      font-family: var(--font-mono);
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: .8px;
      padding: 3px 8px;
      border-radius: 4px;
      flex-shrink: 0;
      border: 1px solid transparent;
    }

    .v-sep { color: var(--tx-3); font-size: 14px; }

    .v-doc-title {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--tx);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .v-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      border: none;
      font-family: var(--font-ui);
      letter-spacing: .2px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--tx-2);
      border: 1px solid var(--border-mid);
    }

    .btn-ghost:hover {
      background: var(--surface);
      color: var(--tx);
      border-color: var(--border-str);
    }

    .btn-blue {
      background: var(--blue);
      color: #fff;
    }

    .btn-blue:hover { background: #1d4ed8; }

    /* PDF iframe */
    .pdf-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .pdf-frame {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      border: none;
      background: #525659;
    }

    /* Empty state */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px;
    }

    .empty-glyph {
      font-size: 52px;
      opacity: .18;
      filter: grayscale(1);
    }

    .empty-title {
      font-family: var(--font-serif);
      font-size: 19px;
      color: var(--tx-2);
      letter-spacing: .3px;
    }

    .empty-body {
      font-size: 13px;
      color: var(--tx-3);
      text-align: center;
      line-height: 1.65;
      max-width: 340px;
    }

    .empty-cmd {
      font-family: var(--font-mono);
      font-size: 11.5px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 6px;
      padding: 8px 16px;
      color: var(--tx-2);
      margin-top: 4px;
    }

    .empty-cmd span { color: var(--green); }

    /* Pack color utilities */
    .core    { --pack-c: var(--pack-core); }
    .premium { --pack-c: var(--pack-premium); }
    .rd      { --pack-c: var(--pack-rd); }
    .main    { --pack-c: var(--pack-main); }

    .active.core    { border-left-color: var(--pack-core); }
    .active.premium { border-left-color: var(--pack-premium); }
    .active.rd      { border-left-color: var(--pack-rd); }
    .active.main    { border-left-color: var(--pack-main); }

    /* Fade animation on iframe reload */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .pdf-frame { animation: fadeIn .25s ease; }
  </style>
</head>
<body>
<div class="app">

  <!-- ── SIDEBAR ─────────────────────────────────────── -->
  <aside class="sidebar">

    <div class="s-header">
      <div class="brand">
        <div class="brand-mark">JX</div>
        <div class="brand-name">
          Jlax Expertise
          <em>base de connaissances</em>
        </div>
      </div>
    </div>

    <div class="s-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" id="searchInput" type="text"
             placeholder="Rechercher…" autocomplete="off" spellcheck="false">
      <span class="search-hint">/</span>
    </div>

    <nav class="s-nav" id="nav"></nav>

    <div class="s-footer">
      <div class="stat">
        <span class="stat-n" id="footerCount">20</span>
        <span class="stat-l">docs</span>
      </div>
      <div class="s-footer-sep"></div>
      <div class="stat">
        <span class="stat-n" id="footerOk">—</span>
        <span class="stat-l">compilés</span>
      </div>
      <div class="s-footer-sep"></div>
      <div class="stat" style="flex:1">
        <span class="stat-n" id="footerActive" style="font-size:11px;color:var(--tx-2)">—</span>
        <span class="stat-l">actif</span>
      </div>
    </div>

  </aside>

  <!-- ── VIEWER ─────────────────────────────────────── -->
  <main class="viewer">

    <div class="v-topbar" id="topbar">
      <div class="v-breadcrumb">
        <span class="v-pack-badge" id="packBadge"></span>
        <span class="v-sep">›</span>
        <span class="v-doc-title" id="docTitle"></span>
      </div>
      <div class="v-actions">
        <button class="btn btn-ghost" onclick="openTab()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          Nouvel onglet
        </button>
        <a class="btn btn-blue" id="dlBtn" href="#" download>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Télécharger
        </a>
      </div>
    </div>

    <div class="empty" id="emptyState">
      <div class="empty-glyph">📂</div>
      <div class="empty-title">Sélectionnez un document</div>
      <div class="empty-body">
        Choisissez le rapport principal ou une fiche technique dans le panneau de gauche.
        Les documents s'affichent ici une fois compilés.
      </div>
      <div class="empty-cmd">
        <span>make fiches</span>  &amp;&amp;  <span>make build</span>
      </div>
    </div>

    <div class="pdf-wrap" id="pdfWrap" style="display:none">
      <iframe class="pdf-frame" id="pdfFrame" title="Visionneuse PDF"></iframe>
    </div>

  </main>
</div>

<script>
// ── Data ───────────────────────────────────────────────────────
const GROUPS = [
  {
    id: 'main', label: 'Rapport Principal', cls: 'main',
    items: [
      { id: 'rapport', title: 'Rapport Stratégique',
        sub: 'Vue d\'ensemble — 19 outils — IA & Automatisation',
        path: 'output/main.pdf', packLabel: 'Rapport' }
    ]
  },
  {
    id: 'core', label: 'Core Pack', cls: 'core',
    items: [
      { id: 'n8n',          title: 'n8n',               sub: 'Orchestration & Automatisation',  path: 'output/fiches/n8n.pdf',          packLabel: 'Core Pack' },
      { id: 'graph_api',    title: 'MS Graph API',       sub: 'Backbone M365',                  path: 'output/fiches/graph_api.pdf',     packLabel: 'Core Pack' },
      { id: 'openai_api',   title: 'OpenAI API',         sub: 'IA Générative',                  path: 'output/fiches/openai_api.pdf',    packLabel: 'Core Pack' },
      { id: 'gophish',      title: 'GoPhish',            sub: 'Simulation de Phishing',         path: 'output/fiches/gophish.pdf',       packLabel: 'Core Pack' },
      { id: 'wazuh',        title: 'Wazuh',              sub: 'SIEM / EDR',                     path: 'output/fiches/wazuh.pdf',         packLabel: 'Core Pack' },
      { id: 'crowdsec',     title: 'CrowdSec',           sub: 'IDS Collaboratif',               path: 'output/fiches/crowdsec.pdf',      packLabel: 'Core Pack' },
      { id: 'uptime_kuma',  title: 'Uptime Kuma',        sub: 'Monitoring Disponibilité',       path: 'output/fiches/uptime_kuma.pdf',   packLabel: 'Core Pack' },
      { id: 'grafana',      title: 'Grafana + InfluxDB', sub: 'Dashboard Temps Réel',           path: 'output/fiches/grafana.pdf',       packLabel: 'Core Pack' },
      { id: 'vaultwarden',  title: 'Vaultwarden',        sub: 'Gestion Mots de Passe',          path: 'output/fiches/vaultwarden.pdf',   packLabel: 'Core Pack' },
      { id: 'restic_b2',    title: 'Restic + B2',        sub: 'Sauvegardes Chiffrées',          path: 'output/fiches/restic_b2.pdf',     packLabel: 'Core Pack' },
      { id: 'secure_score', title: 'Secure Score API',   sub: 'Audit M365',                     path: 'output/fiches/secure_score.pdf',  packLabel: 'Core Pack' },
    ]
  },
  {
    id: 'premium', label: 'Options Premium', cls: 'premium',
    items: [
      { id: 'flowise',      title: 'Flowise',            sub: 'Assistant IA & RAG Documentaire', path: 'output/fiches/flowise.pdf',      packLabel: 'Premium' },
      { id: 'metabase',     title: 'Metabase',           sub: 'Reporting Automatique',            path: 'output/fiches/metabase.pdf',     packLabel: 'Premium' },
      { id: 'paperless',    title: 'Paperless-ngx',      sub: 'GED Intelligente & OCR',           path: 'output/fiches/paperless.pdf',    packLabel: 'Premium' },
      { id: 'odoo',         title: 'Odoo Community',     sub: 'CRM / ERP',                        path: 'output/fiches/odoo.pdf',         packLabel: 'Premium' },
      { id: 'typebot',      title: 'Typebot',            sub: 'Chatbot Web',                      path: 'output/fiches/typebot.pdf',      packLabel: 'Premium' },
      { id: 'azure_openai', title: 'Azure OpenAI',       sub: 'IA Générative RGPD',               path: 'output/fiches/azure_openai.pdf', packLabel: 'Premium' },
    ]
  },
  {
    id: 'rd', label: 'R&D', cls: 'rd',
    items: [
      { id: 'keycloak', title: 'Keycloak', sub: 'SSO & Gestion des Identités', path: 'output/fiches/keycloak.pdf', packLabel: 'R&D' },
      { id: 'ollama',   title: 'Ollama',   sub: 'IA Locale — LLM sur Infra',   path: 'output/fiches/ollama.pdf',   packLabel: 'R&D' },
    ]
  }
];

// ── State ──────────────────────────────────────────────────────
const state = {
  activeId:  null,
  activePath: null,
  available: new Set(),
  collapsed: new Set(),
};

// ── Pack color map ─────────────────────────────────────────────
const PACK_COLORS = {
  main:    { border: '#475569', bg: 'rgba(71,85,105,.15)',  text: '#94a3b8' },
  core:    { border: '#16a34a', bg: 'rgba(22,163,74,.14)',  text: '#4ade80' },
  premium: { border: '#2563eb', bg: 'rgba(37,99,235,.15)',  text: '#60a5fa' },
  rd:      { border: '#a16207', bg: 'rgba(161,98,7,.15)',   text: '#fbbf24' },
};

const PIP_COLORS = {
  main: '#475569', core: '#16a34a', premium: '#2563eb', rd: '#a16207'
};

// ── Availability check ─────────────────────────────────────────
async function checkAvailability() {
  let ok = 0;
  const all = GROUPS.flatMap(g => g.items);
  await Promise.all(all.map(async item => {
    try {
      const r = await fetch(item.path, { method: 'HEAD' });
      if (r.ok) { state.available.add(item.id); ok++; }
    } catch (_) {}
  }));
  document.getElementById('footerOk').textContent = ok;
  renderNav(document.getElementById('searchInput').value);
}

// ── Render ─────────────────────────────────────────────────────
function renderNav(q = '') {
  const nav = document.getElementById('nav');
  const query = q.toLowerCase().trim();
  let html = '';
  let totalVis = 0;

  GROUPS.forEach((group, gi) => {
    const matches = group.items.filter(it =>
      !query ||
      it.title.toLowerCase().includes(query) ||
      it.sub.toLowerCase().includes(query)
    );
    if (query && matches.length === 0) return;

    totalVis += matches.length;
    const closed = !query && state.collapsed.has(group.id) ? 'closed' : '';
    const pip = PIP_COLORS[group.cls] || '#475569';
    const bodyH = matches.length * 50;

    html += `
      <div class="group ${closed}" id="grp-${group.id}">
        <div class="group-header" onclick="toggleGroup('${group.id}')">
          <div class="group-pip" style="background:${pip}"></div>
          <span class="group-label">${group.label}</span>
          <span class="group-count">${matches.length}</span>
          <svg class="group-caret" width="10" height="10" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <polyline points="6,9 12,15 18,9"/>
          </svg>
        </div>
        <div class="group-body" style="max-height:${closed ? 0 : bodyH + 20}px">
    `;

    matches.forEach(item => {
      const isActive = item.id === state.activeId;
      const avail    = state.available.has(item.id);
      html += `
        <div class="doc-item ${isActive ? 'active ' + group.cls : ''}"
             onclick="loadDoc('${item.id}','${item.path}','${item.title}','${item.packLabel}','${group.cls}')">
          <div class="doc-icon">${avail ? '📄' : '⬜'}</div>
          <div class="doc-info">
            <div class="doc-title">${highlight(item.title, query)}</div>
            <div class="doc-sub">${highlight(item.sub, query)}</div>
          </div>
          <div class="doc-status ${avail ? 'ok' : 'miss'}" title="${avail ? 'PDF disponible' : 'Non compilé'}"></div>
        </div>
      `;
    });

    html += `</div></div>`;
    if (gi < GROUPS.length - 1) html += '<div class="g-sep"></div>';
  });

  if (query && totalVis === 0) {
    html = `<div class="no-results">Aucun résultat pour « ${q} »</div>`;
  }

  nav.innerHTML = html;
}

// Highlight search term in text
function highlight(text, q) {
  if (!q) return text;
  const i = text.toLowerCase().indexOf(q);
  if (i === -1) return text;
  return text.slice(0, i)
    + `<mark style="background:rgba(37,99,235,.35);color:var(--tx);border-radius:2px;padding:0 1px">${text.slice(i, i+q.length)}</mark>`
    + text.slice(i + q.length);
}

// ── Toggle group ───────────────────────────────────────────────
function toggleGroup(id) {
  if (state.collapsed.has(id)) state.collapsed.delete(id);
  else state.collapsed.add(id);
  renderNav(document.getElementById('searchInput').value);
}

// ── Load document ──────────────────────────────────────────────
function loadDoc(id, path, title, packLabel, cls) {
  if (!state.available.has(id)) {
    // Still try — browser will show its own error in iframe
  }
  state.activeId   = id;
  state.activePath = path;

  // Topbar
  const colors = PACK_COLORS[cls] || PACK_COLORS.main;
  const badge = document.getElementById('packBadge');
  badge.textContent = packLabel;
  badge.style.cssText = `background:${colors.bg};color:${colors.text};border-color:${colors.border}20`;
  document.getElementById('docTitle').textContent = title;

  // Download
  const dl = document.getElementById('dlBtn');
  dl.href = path;
  dl.download = path.split('/').pop();

  // Show topbar
  document.getElementById('topbar').classList.add('visible');

  // Show viewer
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('pdfWrap').style.display = 'block';

  // Reload iframe with animation
  const frame = document.getElementById('pdfFrame');
  frame.style.animation = 'none';
  frame.offsetHeight; // reflow
  frame.style.animation = '';
  frame.src = path;

  // Footer
  document.getElementById('footerActive').textContent = title;

  // Re-render to update active state
  renderNav(document.getElementById('searchInput').value);
}

// ── Open in tab ────────────────────────────────────────────────
function openTab() {
  if (state.activePath) window.open(state.activePath, '_blank');
}

// ── Search ─────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  renderNav(e.target.value);
});

// ── Keyboard shortcuts ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  const inp = document.getElementById('searchInput');
  if (e.key === '/' && document.activeElement !== inp) {
    e.preventDefault();
    inp.focus();
    inp.select();
  }
  if (e.key === 'Escape') {
    inp.value = '';
    renderNav('');
    inp.blur();
  }
});

// ── Init ───────────────────────────────────────────────────────
document.getElementById('footerCount').textContent =
  GROUPS.reduce((s, g) => s + g.items.length, 0);

renderNav();
checkAvailability();
</script>
</body>
</html>
