server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/pdf;

    # PDF — headers corrects pour l'affichage inline
    location ~* \.pdf$ {
        add_header Content-Type application/pdf;
        add_header X-Content-Type-Options nosniff;
    }

    # Fallback sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pas de logs pour les favicon
    location = /favicon.ico { log_not_found off; access_log off; }
}
