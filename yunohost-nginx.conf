# =============================================================
#  Configuration nginx YunoHost — reportfiles.jlax.fr
#
#  Copier dans : /etc/nginx/conf.d/reportfiles.jlax.fr.d/docs.conf
#  Puis : sudo nginx -t && sudo systemctl reload nginx
# =============================================================

location / {
    # Bypass SSOwat : ce bloc location remplace le access_by_lua_file du server block.
    # Un handler vide = accès accordé sans authentification.
    access_by_lua_block { local _ = 0 }

    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
